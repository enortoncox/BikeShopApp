<a [routerLink]="['/products', itemInfo.productId]" class="product-container">
  <img
    [src]="['https://localhost:7000/' + itemInfo.imgPath]"
    alt=""
  />
  <div class="product-body">
    <h2>{{itemInfo.name}}</h2>
    <h3>Avg Rating: {{itemInfo.avgRating}}/10</h3>
    <h3>Price: £{{itemInfo.price}}</h3>
  </div>
</a>
